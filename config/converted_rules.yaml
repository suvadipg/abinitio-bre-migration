# ============================================================
# CONVERTED RULES - Generated from Ab Initio BRE XML
# This YAML format is the open-source equivalent of BRE rulesets.
# The converter (bre_converter.py) auto-generates this from XML.
# ============================================================

rulesets:

  # ---------------------------------------------------------
  # Transaction Risk Classification
  # ---------------------------------------------------------
  - name: transaction_risk_classification
    description: "Classify transactions by risk level"
    priority: 100
    active: true
    stop_on_first_match: true  # Like Ab Initio's "first match" mode

    rules:
      - name: suspicious_country_override
        priority: 5
        description: "Flag transactions from sanctioned countries"
        condition:
          type: lookup
          field: country_code
          lookup_name: suspicious_countries
        actions:
          - field: risk_level
            value: "CRITICAL"
          - field: review_required
            value: true
          - field: risk_score
            value: 99
          - field: alert_compliance
            value: true

      - name: high_value_transaction
        priority: 10
        description: "High-value transactions flagged as HIGH risk"
        condition:
          type: expression
          expression: "record['transaction_amount'] > 10000.00"
        actions:
          - field: risk_level
            value: "HIGH"
          - field: review_required
            value: true
          - field: risk_score
            value: 85

      - name: international_medium_value
        priority: 20
        description: "International transactions over $5K"
        condition:
          type: expression
          expression: >
            record['transaction_amount'] > 5000.00
            and record['transaction_amount'] <= 10000.00
            and record['is_international'] == 'Y'
        actions:
          - field: risk_level
            value: "HIGH"
          - field: review_required
            value: true
          - field: risk_score
            value: 75

      - name: medium_value_domestic
        priority: 30
        description: "Domestic transactions $5K-$10K"
        condition:
          type: expression
          expression: >
            record['transaction_amount'] > 5000.00
            and record['transaction_amount'] <= 10000.00
            and record['is_international'] == 'N'
        actions:
          - field: risk_level
            value: "MEDIUM"
          - field: review_required
            value: false
          - field: risk_score
            value: 50

      - name: low_value_transaction
        priority: 40
        description: "Low value transactions under $5K"
        condition:
          type: expression
          expression: "record['transaction_amount'] <= 5000.00"
        actions:
          - field: risk_level
            value: "LOW"
          - field: review_required
            value: false
          - field: risk_score
            value: 10

  # ---------------------------------------------------------
  # Fee Calculation
  # ---------------------------------------------------------
  - name: fee_calculation
    description: "Calculate transaction processing fees"
    priority: 200
    active: true
    stop_on_first_match: false  # All matching rules fire

    rules:
      - name: international_surcharge
        priority: 5
        description: "Apply surcharge for international transactions"
        condition:
          type: expression
          expression: "record['is_international'] == 'Y'"
        actions:
          - field: intl_surcharge
            type: computed
            expression: "record['transaction_amount'] * 0.01"
          - field: intl_surcharge_applied
            value: true

      - name: premium_customer_fee
        priority: 10
        description: "Discounted fee for premium customers"
        condition:
          type: expression
          expression: "record['customer_segment'] == 'PREMIUM'"
        actions:
          - field: fee_rate
            value: 0.005
          - field: fee_amount
            type: computed
            expression: "record['transaction_amount'] * 0.005"
          - field: fee_type
            value: "DISCOUNTED"

      - name: standard_customer_fee
        priority: 20
        description: "Standard processing fee"
        condition:
          type: expression
          expression: "record['customer_segment'] == 'STANDARD'"
        actions:
          - field: fee_rate
            value: 0.015
          - field: fee_amount
            type: computed
            expression: "record['transaction_amount'] * 0.015"
          - field: fee_type
            value: "STANDARD"

      - name: new_customer_fee
        priority: 30
        description: "Higher fee for new customers"
        condition:
          type: expression
          expression: "record['customer_segment'] == 'NEW'"
        actions:
          - field: fee_rate
            value: 0.020
          - field: fee_amount
            type: computed
            expression: "record['transaction_amount'] * 0.020"
          - field: fee_type
            value: "NEW_CUSTOMER"

# ---------------------------------------------------------
# Decision Tables
# ---------------------------------------------------------
decision_tables:

  - name: customer_tier_assignment
    description: "Assign customer loyalty tier based on account age and volume"
    input_columns:
      - name: account_age_years
        type: range
      - name: annual_volume
        type: range
    output_columns:
      - loyalty_tier
      - discount_pct
      - priority_processing
    rows:
      - inputs:
          account_age_years: { min: 0, max: 1 }
          annual_volume: { min: 0, max: 50000 }
        outputs:
          loyalty_tier: "BRONZE"
          discount_pct: 0
          priority_processing: false

      - inputs:
          account_age_years: { min: 0, max: 1 }
          annual_volume: { min: 50000, max: 999999999 }
        outputs:
          loyalty_tier: "SILVER"
          discount_pct: 5
          priority_processing: false

      - inputs:
          account_age_years: { min: 1, max: 5 }
          annual_volume: { min: 0, max: 100000 }
        outputs:
          loyalty_tier: "SILVER"
          discount_pct: 5
          priority_processing: false

      - inputs:
          account_age_years: { min: 1, max: 5 }
          annual_volume: { min: 100000, max: 999999999 }
        outputs:
          loyalty_tier: "GOLD"
          discount_pct: 10
          priority_processing: true

      - inputs:
          account_age_years: { min: 5, max: 999 }
          annual_volume: { min: 0, max: 100000 }
        outputs:
          loyalty_tier: "GOLD"
          discount_pct: 10
          priority_processing: true

      - inputs:
          account_age_years: { min: 5, max: 999 }
          annual_volume: { min: 100000, max: 999999999 }
        outputs:
          loyalty_tier: "PLATINUM"
          discount_pct: 20
          priority_processing: true

# ---------------------------------------------------------
# Lookups (reference data)
# ---------------------------------------------------------
lookups:
  suspicious_countries:
    type: set
    values: ["NK", "IR", "SY", "CU"]

  currency_rates:
    type: key_value
    source: file
    path: "sample_data/currency_rates.csv"
